<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "primary": "#21c488",
                "background-light": "#f6f8f7",
                "background-dark": "#12201b",
            },
            fontFamily: {
                "display": ["Cairo", "Lexend", "sans-serif"]
            },
            borderRadius: {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
        },
    },
}
</script>

<style type="text/tailwindcss">
body { font-family: 'Cairo', sans-serif; }

.star-pattern {
    background-image: radial-gradient(circle at 2px 2px, #21c488 2px, transparent 0);
    background-size: 40px 40px;
    background-repeat: repeat;
    opacity: 0.08;
}

.floating-rocket { animation: float 4s ease-in-out infinite; }

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-5deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
}

.form-input {
    @apply w-full px-5 py-4 bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl focus:border-primary focus:ring-0 transition-all text-lg font-medium;
}

.form-label {
    @apply block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 mr-2;
}
</style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">

<div class="relative min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
<div class="fixed inset-0 star-pattern pointer-events-none"></div>

<div class="w-full max-w-4xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-[3rem] shadow-2xl border border-white dark:border-slate-800 relative z-10 overflow-hidden">
<div class="grid grid-cols-1 lg:grid-cols-12">

<div class="lg:col-span-5 bg-primary p-8 lg:p-12 flex flex-col items-center justify-center text-white text-center relative overflow-hidden">
<img src="assets/img/log.png" style="width: 250px;">
<h1 class="text-4xl font-black mb-4">انضم إلينا!</h1>
<p class="text-white/90 text-lg leading-relaxed mb-8">ابدأ رحلتك التعليمية الممتعة واجمع النجوم في عالم إيكو ستارز</p>
</div>

<div class="lg:col-span-7 p-8 lg:p-12">
<h2 class="text-2xl font-black mb-10">تسجيل طفل جديد</h2>

<form id="childSignupForm" class="space-y-6">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="form-label">اسم البطل</label>
<input name="name" class="form-input" type="text"/>
</div>

<div>
<label class="form-label">تاريخ الميلاد</label>
<input name="birth_date" class="form-input" type="date"/>
</div>

<div>
<label class="form-label">الصف الدراسي</label>
<select name="grade" class="form-input">
<option value="">اختر الصف</option>
<option>التمهيدي</option>
<option>الصف الأول</option>
<option>الصف الثاني</option>
<option>الصف الثالث</option>
</select>
</div>

<div>
<label class="form-label">اسم ولي الأمر</label>
<input name="parent_name" class="form-input" type="text"/>
</div>

<div>
<label class="form-label">رقم جوال ولي الأمر</label>
<input name="parent_phone" class="form-input" type="tel"/>
</div>

<div>
<label class="form-label">كلمة المرور</label>
<input name="password" class="form-input" type="password"/>
</div>

</div>

<button class="w-full py-5 bg-primary text-white rounded-2xl text-xl font-black" type="submit">
إنشاء الحساب
</button>

</form>

</div>
</div>
</div>
</div>

<!-- ================= API SCRIPT ================= -->

<script>
document.getElementById("childSignupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    // إنشاء email فريد باستخدام timestamp
    const uniqueId = Date.now();
    const email = formData.get("parent_phone") + "+" + uniqueId + "@child.com";

    const data = {
        name: formData.get("name"),
        email: email,
        password: formData.get("password"),
        role: "child",
        birth_date: formData.get("birth_date"),
        grade: formData.get("grade"),
        parent_name: formData.get("parent_name"),
        parent_phone: formData.get("parent_phone")
    };

    console.log("Sending Data:", data);

    try {
        const res = await fetch("http://127.0.0.1:8000/api/child/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        console.log("Status:", res.status);

        const json = await res.json();
        console.log("Response:", json);

        if (res.ok && json.token) {
            localStorage.setItem("token", json.token);
            alert("تم إنشاء الحساب بنجاح 🎉");
            window.location.href = "child-dashboard.html";
        } else {
            alert(json.message || "حدث خطأ أثناء التسجيل");
        }
    } catch(err) {
        console.error(err);
        alert("خطأ في الاتصال بالسيرفر. تأكد أن السيرفر شغال على http://127.0.0.1:8000");
    }
});
</script>

</body>
</html>
